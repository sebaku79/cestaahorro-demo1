<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cestahorro - Optimizador Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <datalist id="lista-productos"></datalist>

    <header class="bg-blue-600 text-white p-5 shadow-sm rounded-b-2xl text-center">
        <h1 class="text-xl font-bold mb-1">🛒 Cestahorro Pro</h1>
        <p class="text-blue-100 text-xs" id="status-text">Conectando con base de datos...</p>
    </header>

    <main class="max-w-xl mx-auto p-3 mt-2">
        <div id="search-section" class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-6 opacity-50 pointer-events-none">
            <h2 class="text-sm font-semibold mb-3 text-slate-700">¿Qué productos buscas?</h2>
            <div id="inputs-container" class="space-y-2 mb-4"></div>
            <button onclick="addInputRow()" class="text-blue-600 font-medium text-xs mb-6 flex items-center gap-1">+ Añadir otro producto</button>
            <button onclick="startOptimization()" class="w-full bg-green-500 text-white text-base font-bold py-3 rounded-lg shadow-md">✨ Calcular Ahorro</button>
            <p id="error-msg" class="text-red-500 text-xs mt-3 text-center hidden"></p>
        </div>
        <div id="results-section" class="hidden"></div>
    </main>

    <script>
        // Enlace automático a tu Google Sheets
        const ID_DOCUMENTO = '1r2cN8fnQI0xqb6Xo2K1lOTFWUlGdYhb1';
        const URL_EXCEL = `https://docs.google.com/spreadsheets/d/${ID_DOCUMENTO}/export?format=csv`;

        // ⚠️ AQUÍ CONFIGURAS LOS NOMBRES Y LOS ENVÍOS DE TUS FARMACIAS
        const tiendas = {
            "Promofarma": { envio: 4.00, envioGratisDesde: 45.00 }, // Cambia estos importes por los reales de Promofarma
            "Atida": { envio: 2.99, envioGratisDesde: 35.00 },      // Cambia estos importes por los reales de Atida
            "Farmacia 3": { envio: 3.50, envioGratisDesde: 50.00 }  // Pon el nombre de tu columna D
        };

        let catalogo = {};
        let inputCount = 0;
        const inputsContainer = document.getElementById('inputs-container');
        const errorMsg = document.getElementById('error-msg');

        window.onload = async () => {
            try {
                const response = await fetch(URL_EXCEL);
                const data = await response.text();
                const filas = data.split('\n').slice(1); // Saltar la Fila 1 (cabeceras)
                
                const datalist = document.getElementById('lista-productos');
                
                filas.forEach(fila => {
                    const columnas = fila.split(/,|;/); 
                    if(columnas.length >= 2 && columnas[0].trim() !== '') {
                        const nombre = columnas[0].trim().toLowerCase();
                        
                        // Guardamos los precios de las columnas (B, C y D)
                        catalogo[nombre] = {
                            "Promofarma": parseFloat(columnas[1] ? columnas[1].replace(',', '.') : 'NaN'),
                            "Atida": parseFloat(columnas[2] ? columnas[2].replace(',', '.') : 'NaN'),
                            "Farmacia 3": parseFloat(columnas[3] ? columnas[3].replace(',', '.') : 'NaN')
                        };
                        
                        let option = document.createElement('option');
                        option.value = nombre;
                        datalist.appendChild(option);
                    }
                });

                document.getElementById('status-text').textContent = "✅ Catálogo actualizado y listo";
                document.getElementById('search-section').classList.remove('opacity-50', 'pointer-events-none');
                addInputRow(); addInputRow();
            } catch (e) {
                document.getElementById('status-text').textContent = "❌ Error al leer el Excel";
                console.error(e);
            }
        };

        function addInputRow() {
            inputCount++;
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center bg-white p-2 rounded border border-slate-200 shadow-sm';
            div.id = `row-${inputCount}`;
            div.innerHTML = `
                <input type="text" list="lista-productos" class="product-input flex-1 bg-transparent px-1 py-1 text-sm outline-none placeholder-slate-300" placeholder="Ej: alflorex...">
                <div class="flex items-center bg-slate-50 rounded px-1 shrink-0 border border-slate-100">
                    <span class="text-[9px] text-slate-400 font-bold mr-1">UDS:</span>
                    <input type="number" class="qty-input w-6 bg-transparent text-sm font-bold text-center outline-none p-0" value="1" min="1">
                </div>
                <button onclick="removeInputRow('${div.id}')" class="text-slate-300 hover:text-red-500 p-1 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            `;
            inputsContainer.appendChild(div);
        }

        function removeInputRow(rowId) { 
            if(document.querySelectorAll('.product-input').length > 1) document.getElementById(rowId).remove(); 
        }

        function startOptimization() {
            errorMsg.classList.add('hidden');
            const rows = document.querySelectorAll('#inputs-container > div');
            let productosBuscados = [];
            
            rows.forEach(row => {
                const input = row.querySelector('.product-input');
                const qtyInput = row.querySelector('.qty-input');
                const val = input.value.trim().toLowerCase();
                const qty = parseInt(qtyInput.value) || 1;
                if (val !== '') productosBuscados.push({ nombre: val, cantidad: qty });
            });

            if (productosBuscados.length === 0) {
                errorMsg.textContent = "Escribe al menos un producto.";
                errorMsg.classList.remove('hidden'); return;
            }

            for (let item of productosBuscados) {
                if (!catalogo[item.nombre]) {
                    errorMsg.textContent = `No tenemos "${item.nombre}" en la base de datos.`;
                    errorMsg.classList.remove('hidden'); return;
                }
            }

            document.getElementById('search-section').classList.add('hidden');
            mostrarResultados(calcularMejorCesta(productosBuscados));
        }

        function calcularMejorCesta(listaProductos) {
            let opciones = [];
            const nombresTiendas = Object.keys(tiendas);

            nombresTiendas.forEach(tienda => {
                let tieneTodos = true; let subtotal = 0; let dist = [];
                listaProductos.forEach(item => {
                    if (catalogo[item.nombre] && !isNaN(catalogo[item.nombre][tienda])) {
                        let costoLinea = catalogo[item.nombre][tienda] * item.cantidad;
                        subtotal += costoLinea;
                        dist.push({nombre: item.nombre, cant: item.cantidad, precio: costoLinea, tienda: tienda});
                    } else { tieneTodos = false; }
                });
                if (tieneTodos) {
                    let envio = subtotal >= tiendas[tienda].envioGratisDesde ? 0 : tiendas[tienda].envio;
                    opciones.push({ tipo: 'unica', titulo: tienda, subtotal: subtotal, envio: envio, total: subtotal + envio, distribucion: dist, resumenEnvios: [{t: tienda, s: subtotal, e: envio, u: tiendas[tienda].envioGratisDesde}] });
                }
            });

            for (let i = 0; i < nombresTiendas.length; i++) {
                for (let j = i + 1; j < nombresTiendas.length; j++) {
                    let t1 = nombresTiendas[i]; let t2 = nombresTiendas[j];
                    let valido = true; let sub1 = 0; let sub2 = 0; let dist = [];
                    listaProductos.forEach(item => {
                        let p1 = (!isNaN(catalogo[item.nombre][t1])) ? catalogo[item.nombre][t1] : Infinity;
                        let p2 = (!isNaN(catalogo[item.nombre][t2])) ? catalogo[item.nombre][t2] : Infinity;
                        if (p1 === Infinity && p2 === Infinity) valido = false;
                        else if (p1 <= p2) { let costo = p1 * item.cantidad; sub1 += costo; dist.push({nombre: item.nombre, cant: item.cantidad, precio: costo, tienda: t1}); }
                        else { let costo = p2 * item.cantidad; sub2 += costo; dist.push({nombre: item.nombre, cant: item.cantidad, precio: costo, tienda: t2}); }
                    });
                    if (valido && sub1 > 0 && sub2 > 0) {
                        let env1 = sub1 >= tiendas[t1].envioGratisDesde ? 0 : tiendas[t1].envio;
                        let env2 = sub2 >= tiendas[t2].envioGratisDesde ? 0 : tiendas[t2].envio;
                        opciones.push({ tipo: 'dividida', titulo: `${t1} + ${t2}`, subtotal: sub1 + sub2, envio: env1 + env2, total: sub1 + sub2 + env1 + env2, distribucion: dist, resumenEnvios: [{t: t1, s: sub1, e: env1, u: tiendas[t1].envioGratisDesde}, {t: t2, s: sub2, e: env2, u: tiendas[t2].envioGratisDesde}] });
                    }
                }
            }
            return opciones.sort((a, b) => a.total - b.total);
        }

        function mostrarResultados(opciones) {
            const resultsSection = document.getElementById('results-section');
            let html = '';
            opciones.slice(0, 3).forEach((opt, index) => {
                let esG = index === 0;
                html += `<div class="${esG ? 'bg-green-50 border-green-300' : 'bg-white border-slate-200'} border p-4 rounded-xl mb-4 shadow-sm">
                    <div class="text-center">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full uppercase ${opt.tipo === 'unica' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800'}">${opt.tipo === 'unica' ? '📦 1 Paquete' : '✂️ Compra Dividida'}</span>
                        <h2 class="text-base font-bold mt-1">${opt.titulo}</h2>
                        <div class="text-2xl font-black ${esG ? 'text-green-700' : 'text-slate-800'}">${opt.total.toFixed(2)}€</div>
                    </div>`;
                opt.resumenEnvios.forEach(res => {
                    let prods = opt.distribucion.filter(p => p.tienda === res.t);
                    html += `<div class="mt-2 text-xs bg-white/50 p-2 rounded border border-slate-100">
                        <p class="font-bold border-b mb-1 uppercase text-[9px] text-slate-400">Tienda: ${res.t}</p>
                        ${prods.map(p => `<div class="flex justify-between text-slate-600"><span>${p.cant}x ${p.nombre}</span><span>${p.precio.toFixed(2)}€</span></div>`).join('')}
                        <p class="mt-1 font-bold ${res.e === 0 ? 'text-green-600' : 'text-orange-500'}">${res.e === 0 ? 'Envío Gratis' : 'Envío: ' + res.e.toFixed(2) + '€'}</p>
                    </div>`;
                });
                html += `</div>`;
            });
            html += `<button onclick="location.reload()" class="w-full text-center text-slate-400 text-xs underline mt-2 pb-8">Nueva búsqueda</button>`;
            resultsSection.innerHTML = html;
            resultsSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
