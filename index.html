<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cestahorro - Optimizador Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <datalist id="lista-productos"></datalist>

    <header class="bg-emerald-600 text-white p-6 shadow-md rounded-b-3xl text-center">
        <h1 class="text-2xl font-extrabold mb-1 tracking-tight">🛒 Cestahorro</h1>
        <p class="text-emerald-100 text-xs font-medium" id="status-text">Conectando con base de datos...</p>
    </header>

    <main class="max-w-xl mx-auto p-4 mt-2">
        <div id="search-section" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 opacity-50 pointer-events-none transition-opacity duration-300">
            <h2 class="text-sm font-bold mb-4 text-slate-700 uppercase tracking-wide text-center">¿Qué productos necesitas?</h2>
            <div id="inputs-container" class="space-y-3 mb-5"></div>
            <button onclick="addInputRow()" class="text-emerald-600 font-bold text-xs mb-6 flex items-center gap-1 bg-emerald-50 px-3 py-2 rounded-lg w-full justify-center">+ Añadir otro producto</button>
            <button onclick="startOptimization()" class="w-full bg-slate-800 hover:bg-slate-900 transition-colors text-white text-base font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                ✨ Calcular Mejor Precio
            </button>
            <p id="error-msg" class="text-red-500 text-xs mt-3 text-center hidden font-medium"></p>
        </div>
        <div id="results-section" class="hidden"></div>
    </main>

    <script>
        const ID_DOCUMENTO = '1r2cN8fnQI0xqb6Xo2K1lOTFWUlGdYhb1';
        const URL_EXCEL = `https://docs.google.com/spreadsheets/d/${ID_DOCUMENTO}/export?format=csv`;

        const tiendas = {
            "Promofarma": { envio: 4.00, envioGratisDesde: 49.00 },
            "Atida": { envio: 2.99, envioGratisDesde: 49.00 },
            "Dosfarma": { envio: 3.99, envioGratisDesde: 49.00 },
            "Farmacia Jiménez": { envio: 3.99, envioGratisDesde: 50.00 },
            "Farmacia Eva Contreras": { envio: 3.99, envioGratisDesde: 50.00 },
            "Farmacia Barata": { envio: 3.99, envioGratisDesde: 65.00 },
            "Farmacia Top": { envio: 3.99, envioGratisDesde: 59.00 }
        };

        let catalogo = {};
        let inputCount = 0;
        const inputsContainer = document.getElementById('inputs-container');
        const errorMsg = document.getElementById('error-msg');

        window.onload = async () => {
            try {
                const response = await fetch(URL_EXCEL);
                const data = await response.text();
                const filas = data.split(/\r?\n/).slice(1); 
                
                const datalist = document.getElementById('lista-productos');
                
                filas.forEach(fila => {
                    let columnas = fila.includes(';') ? fila.split(';') : fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(columnas.length >= 2 && columnas[0].trim() !== '') {
                        const nombre = columnas[0].replace(/"/g, '').trim().toLowerCase();
                        const p = (val) => {
                            if (!val || val.trim() === '') return NaN;
                            return parseFloat(val.replace(/"/g, '').trim().replace(',', '.'));
                        };
                        catalogo[nombre] = {
                            "Promofarma": p(columnas[1]), "Atida": p(columnas[2]), "Dosfarma": p(columnas[3]),
                            "Farmacia Jiménez": p(columnas[4]), "Farmacia Eva Contreras": p(columnas[5]),
                            "Farmacia Barata": p(columnas[6]), "Farmacia Top": p(columnas[7])
                        };
                        let option = document.createElement('option');
                        option.value = nombre;
                        datalist.appendChild(option);
                    }
                });

                document.getElementById('status-text').textContent = "✅ Base de datos sincronizada";
                document.getElementById('search-section').classList.remove('opacity-50', 'pointer-events-none');
                addInputRow(); addInputRow();
            } catch (e) {
                document.getElementById('status-text').textContent = "❌ Error de conexión";
            }
        };

        function addInputRow() {
            inputCount++;
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200 focus-within:border-emerald-400 focus-within:ring-1 focus-within:ring-emerald-400 transition-all';
            div.id = `row-${inputCount}`;
            div.innerHTML = `
                <input type="text" list="lista-productos" class="product-input flex-1 bg-transparent px-2 py-1 text-sm outline-none placeholder-slate-400 font-medium" placeholder="Escribe el producto...">
                <div class="flex items-center bg-white rounded-lg px-2 py-1 shrink-0 border border-slate-200 shadow-sm">
                    <span class="text-[10px] text-slate-400 font-bold mr-1">UDS:</span>
                    <input type="number" class="qty-input w-8 bg-transparent text-sm font-bold text-center outline-none p-0 text-emerald-700" value="1" min="1">
                </div>
                <button onclick="removeInputRow('${div.id}')" class="text-slate-400 hover:text-red-500 p-2 shrink-0 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            `;
            inputsContainer.appendChild(div);
        }

        function removeInputRow(rowId) { 
            if(document.querySelectorAll('.product-input').length > 1) document.getElementById(rowId).remove(); 
        }

        function startOptimization() {
            errorMsg.classList.add('hidden');
            const rows = document.querySelectorAll('#inputs-container > div');
            let productosBuscados = [];
            
            rows.forEach(row => {
                const input = row.querySelector('.product-input');
                const qtyInput = row.querySelector('.qty-input');
                const val = input.value.trim().toLowerCase();
                const qty = parseInt(qtyInput.value) || 1;
                if (val !== '') productosBuscados.push({ nombre: val, cantidad: qty });
            });

            if (productosBuscados.length === 0) {
                errorMsg.textContent = "Escribe al menos un producto para empezar.";
                errorMsg.classList.remove('hidden'); return;
            }

            for (let item of productosBuscados) {
                if (!catalogo[item.nombre]) {
                    errorMsg.textContent = `No tenemos "${item.nombre}" en nuestro catálogo.`;
                    errorMsg.classList.remove('hidden'); return;
                }
            }

            document.getElementById('search-section').classList.add('hidden');
            mostrarResultados(calcularMejorCesta(productosBuscados));
        }

        function calcularMejorCesta(listaProductos) {
            let opciones = [];
            const nombresTiendas = Object.keys(tiendas);
            const N = listaProductos.length;

            nombresTiendas.forEach(tienda => {
                let tieneTodos = true; let subtotal = 0; let dist = [];
                listaProductos.forEach(item => {
                    let precio = catalogo[item.nombre][tienda];
                    if (precio && !isNaN(precio)) {
                        let costoLinea = precio * item.cantidad;
                        subtotal += costoLinea;
                        dist.push({nombre: item.nombre, cant: item.cantidad, precio: costoLinea, tienda: tienda});
                    } else { tieneTodos = false; }
                });
                if (tieneTodos && subtotal > 0) {
                    let envio = subtotal >= tiendas[tienda].envioGratisDesde ? 0 : tiendas[tienda].envio;
                    opciones.push({ tipo: 'unica', titulo: tienda, subtotal: subtotal, envio: envio, total: subtotal + envio, distribucion: dist, resumenEnvios: [{t: tienda, s: subtotal, e: envio, u: tiendas[tienda].envioGratisDesde}] });
                }
            });

            if (N > 0 && N <= 15) {
                for (let i = 0; i < nombresTiendas.length; i++) {
                    for (let j = i + 1; j < nombresTiendas.length; j++) {
                        let t1 = nombresTiendas[i]; let t2 = nombresTiendas[j];
                        let mejorOpcionPar = null;
                        const combinaciones = 1 << N; 
                        for (let mask = 1; mask < combinaciones - 1; mask++) {
                            let sub1 = 0; let sub2 = 0; let dist = []; let valido = true;
                            for (let k = 0; k < N; k++) {
                                let item = listaProductos[k];
                                let vaAlT1 = (mask & (1 << k)) === 0;
                                let tiendaElegida = vaAlT1 ? t1 : t2;
                                let precio = catalogo[item.nombre][tiendaElegida];
                                if (precio && !isNaN(precio)) {
                                    let costoLinea = precio * item.cantidad;
                                    if (vaAlT1) sub1 += costoLinea; else sub2 += costoLinea;
                                    dist.push({nombre: item.nombre, cant: item.cantidad, precio: costoLinea, tienda: tiendaElegida});
                                } else { valido = false; break; }
                            }
                            if (valido && sub1 > 0 && sub2 > 0) {
                                let env1 = sub1 >= tiendas[t1].envioGratisDesde ? 0 : tiendas[t1].envio;
                                let env2 = sub2 >= tiendas[t2].envioGratisDesde ? 0 : tiendas[t2].envio;
                                let totalCalculado = sub1 + sub2 + env1 + env2;
                                if (!mejorOpcionPar || totalCalculado < mejorOpcionPar.total) {
                                    mejorOpcionPar = { tipo: 'dividida', titulo: `${t1} + ${t2}`, subtotal: sub1 + sub2, envio: env1 + env2, total: totalCalculado, distribucion: dist, resumenEnvios: [{t: t1, s: sub1, e: env1, u: tiendas[t1].envioGratisDesde}, {t: t2, s: sub2, e: env2, u: tiendas[t2].envioGratisDesde}] };
                                }
                            }
                        }
                        if (mejorOpcionPar) opciones.push(mejorOpcionPar);
                    }
                }
            }
            return opciones.sort((a, b) => a.total - b.total);
        }

        function mostrarResultados(opciones) {
            const resultsSection = document.getElementById('results-section');
            let html = '';
            
            if(opciones.length === 0) {
                html = `<div class="bg-red-50 border border-red-200 p-6 rounded-2xl text-center shadow-sm">
                            <span class="text-3xl mb-2 block">🧐</span>
                            <p class="text-red-700 font-bold text-lg">No encontramos combinación</p>
                            <p class="text-sm text-red-500 mt-2">Ninguna de nuestras farmacias tiene todos estos productos juntos. Prueba a quitar alguno.</p>
                        </div>`;
            } else {
                // Calcular el ahorro comparando la mejor con la peor opción
                let mejorPrecio = opciones[0].total;
                let peorPrecio = opciones[opciones.length - 1].total;
                let ahorro = peorPrecio - mejorPrecio;

                opciones.slice(0, 3).forEach((opt, index) => {
                    let esG = index === 0;
                    
                    // Cartel de ahorro solo en el primer resultado
                    let cartelAhorro = '';
                    if (esG && ahorro > 0.5) {
                        cartelAhorro = `<div class="bg-emerald-500 text-white text-xs font-bold py-1 px-3 rounded-full inline-block mb-3 shadow-sm transform -translate-y-2">🔥 Te ahorras ${ahorro.toFixed(2)}€</div>`;
                    }

                    html += `<div class="${esG ? 'bg-gradient-to-b from-emerald-50 to-white border-emerald-300 ring-2 ring-emerald-100' : 'bg-white border-slate-200'} border p-5 rounded-2xl mb-5 shadow-sm relative">
                        <div class="text-center">
                            ${cartelAhorro}
                            <div>
                                <span class="text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider ${opt.tipo === 'unica' ? 'bg-slate-100 text-slate-600' : 'bg-indigo-50 text-indigo-600'}">${opt.tipo === 'unica' ? '📦 1 Solo Paquete' : '✂️ Compra Dividida'}</span>
                            </div>
                            <h2 class="text-lg font-bold mt-2 text-slate-700">${opt.titulo}</h2>
                            <div class="text-3xl font-black mt-1 ${esG ? 'text-emerald-600' : 'text-slate-800'}">${opt.total.toFixed(2)}€</div>
                        </div>`;
                        
                    opt.resumenEnvios.forEach(res => {
                        let prods = opt.distribucion.filter(p => p.tienda === res.t);
                        html += `<div class="mt-4 text-xs bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                            <p class="font-black border-b border-slate-100 pb-1 mb-2 text-slate-500 uppercase flex justify-between">
                                <span>🛒 ${res.t}</span>
                                <span class="${res.e === 0 ? 'text-emerald-500' : 'text-amber-500'}">${res.e === 0 ? 'Envío Gratis' : '+' + res.e.toFixed(2) + '€ envío'}</span>
                            </p>
                            ${prods.map(p => `<div class="flex justify-between text-slate-600 py-1 font-medium"><span class="truncate pr-2">${p.cant}x <span class="capitalize">${p.nombre}</span></span><span class="shrink-0">${p.precio.toFixed(2)}€</span></div>`).join('')}
                        </div>`;
                    });
                    html += `</div>`;
                });
            }
            html += `<button onclick="location.reload()" class="w-full text-center text-slate-500 font-bold text-sm bg-slate-100 py-4 rounded-xl mt-2 mb-8 hover:bg-slate-200 transition-colors">← Hacer nueva búsqueda</button>`;
            resultsSection.innerHTML = html;
            resultsSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
