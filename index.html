<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cestahorro - Tu Ahorro Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Geologica', 'sans-serif'], },
                    colors: {
                        mint: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0f9688', 700: '#0f766e', 800: '#115e59', 900: '#134e4a', 950: '#042f2e', },
                        accent: { gold: '#f59e0b', violet: '#8b5cf6' }
                    },
                }
            }
        }
    </script>
    <style>
        html, body { max-width: 100vw; overflow-x: hidden; background-color: #fafaf9; }
        @keyframes dynamic-gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes loading-bar { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { animation: marquee 25s linear infinite; width: max-content; }
        .animate-marquee:hover { animation-play-state: paused; }
        .mask-marquee { -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); }
        .dynamic-cta { background: linear-gradient(-45deg, #14b8a6, #8b5cf6, #14b8a6, #f59e0b); background-size: 400% 400%; animation: dynamic-gradient 5s ease infinite; transition: transform 0.2s ease-in-out; }
        .dynamic-cta:active { transform: scale(0.96); }
        .glass-header { background: rgba(20, 184, 166, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        input, select { font-size: 16px !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .bg-gradient-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6; }
        .blob-1 { top: -10%; left: -10%; width: 40%; height: 40%; background: #ccfbf1; }
        .blob-2 { bottom: -10%; right: -10%; width: 50%; height: 50%; background: #e9d5ff; }
        .blob-3 { top: 40%; left: 30%; width: 20%; height: 20%; background: #fef3c7; }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex flex-col">

    <div class="bg-gradient-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

    <div id="redirect-modal" class="fixed inset-0 bg-slate-950/70 z-[60] hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm flex items-center justify-center px-5">
        <div class="bg-white rounded-[32px] p-8 text-center shadow-2xl max-w-sm w-full transform scale-95 transition-transform duration-300 border-2 border-mint-100" id="redirect-content">
            <div class="text-5xl mb-4 animate-bounce">🛒</div>
            <h3 class="text-xl font-black text-slate-800 mb-2 leading-tight">Redirigiendo a <br><span id="redirect-tienda" class="text-mint-600 text-2xl uppercase tracking-tighter"></span></h3>
            <p class="text-xs font-bold text-slate-500 mb-6 bg-slate-50 p-3 rounded-xl border border-slate-100 leading-relaxed">Esperamos que tu experiencia en <span class="text-slate-800 font-black italic">Cestahorro</span> haya sido de tu agrado.</p>
            <div class="w-full bg-mint-50 rounded-full h-2 mb-2 overflow-hidden shadow-inner"><div class="bg-mint-500 h-2 rounded-full w-0" id="loading-bar"></div></div>
        </div>
    </div>

    <div id="legal-modal" class="fixed inset-0 bg-slate-950/80 z-[70] hidden opacity-0 transition-opacity duration-300 backdrop-blur-md flex items-center justify-center px-4 py-10">
        <div class="bg-white rounded-3xl w-full max-w-lg h-full max-h-[80vh] flex flex-col shadow-2xl overflow-hidden border border-slate-100">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="legal-title" class="text-lg font-black text-slate-900 uppercase tracking-tighter"></h3>
                <button onclick="closeLegal()" class="text-slate-400 hover:text-slate-900 p-2 bg-white rounded-full shadow-sm border border-slate-100 text-xl leading-none w-8 h-8 flex items-center justify-center">&times;</button>
            </div>
            <div id="legal-body" class="p-8 overflow-y-auto text-sm text-slate-600 leading-relaxed font-medium space-y-4"></div>
        </div>
    </div>

    <div id="menu-overlay" onclick="cerrarMenu()" class="fixed inset-0 bg-slate-950/40 z-40 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>
    <div id="menu-lateral" class="fixed top-0 left-0 h-full w-[70%] max-w-[280px] glass-panel z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col rounded-r-3xl border-r border-white/20">
        <div class="bg-gradient-to-br from-mint-600 to-accent-violet text-white p-6 rounded-br-3xl shadow-lg border-b border-white/10">
            <div class="flex items-center gap-2 mt-4">
                <h2 class="text-2xl font-black italic tracking-tighter text-white">CESTAHORRO</h2>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-accent-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            </div>
            <p class="text-[10px] uppercase tracking-widest text-mint-100 mt-1.5 font-bold opacity-80">Ahorro inteligente</p>
        </div>
        <nav class="flex-1 px-5 py-6 space-y-2 overflow-y-auto">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-4">Sectores</h3>
            <a href="#" onclick="cerrarMenu()" class="flex items-center gap-3.5 text-mint-800 font-bold text-sm bg-mint-50 rounded-2xl px-4 py-3.5 border border-mint-100 transition-colors shadow-inner"><span class="text-lg">🏥</span> Farmacia y Bebé <span class="ml-auto text-[9px] bg-mint-600 text-white px-2 py-0.5 rounded-full font-black">ACTUAL</span></a>
        </nav>
    </div>

    <header class="relative glass-header text-white px-6 shadow-lg rounded-b-[30px] mb-3 flex items-center justify-center min-h-[90px] z-30 overflow-visible">
        <button onclick="abrirMenu()" class="absolute left-5 top-1/2 -translate-y-1/2 z-20 text-mint-100 hover:text-white transition-colors p-1.5 bg-white/10 rounded-xl border border-white/10 active:scale-95 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center pointer-events-none pl-6 Header-Title-Area">
            <button onclick="location.reload()" class="inline-flex items-center justify-center gap-2 hover:opacity-80 transition-opacity active:scale-95 outline-none pointer-events-auto">
                <h1 class="text-3xl font-black italic tracking-tighter text-white drop-shadow-sm leading-none">CESTAHORRO</h1>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-accent-gold drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            </button>
            <p class="text-mint-100 text-[9px] font-semibold uppercase tracking-widest opacity-80 mt-1 block" id="status-text">Cargando...</p>
        </div>
        
        <div class="absolute -bottom-3 left-0 right-0 flex justify-center z-40 Dropdown-Container">
            <div class="relative flex flex-col items-center">
                <button onclick="toggleTiendas()" class="flex items-center gap-2 bg-slate-900/90 backdrop-blur-md px-4 py-1.5 rounded-full shadow-md border border-white/10 hover:bg-slate-800 transition-colors active:scale-95 relative z-50 Pastilla-Boton">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-mint-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-mint-500"></span></span>
                    <span class="text-[8px] font-bold text-white uppercase tracking-widest" id="contador-tiendas">Cargando tiendas...</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-mint-400 opacity-80 transition-transform duration-300" id="fletcha-tiendas" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
                </button>
                <div id="dropdown-tiendas" class="w-56 bg-slate-900/95 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl overflow-hidden transition-all duration-500 max-h-0 opacity-0 flex flex-col absolute top-full mt-2 z-40 Listado-Persiana">
                    <div id="lista-tiendas-nombres" class="px-4 py-2 max-h-56 overflow-y-auto scrollbar-hide text-center space-y-2.5 pt-4 pb-4">
                        </div>
                    <button onclick="toggleTiendas()" class="w-full py-2.5 bg-slate-800 hover:bg-mint-600 text-mint-400 hover:text-white flex justify-center items-center transition-colors border-t border-white/10 active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 11l7-7 7 7M5 19l7-7 7 7" /></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto w-full px-4 mt-8 flex-grow relative z-10 Main-Content">
        <div id="search-section" class="bg-white/70 backdrop-blur-sm px-4 py-4 rounded-3xl shadow-xl shadow-slate-200/40 border border-white mb-4 opacity-0 transition-opacity duration-500 relative">
            <div id="inputs-container" class="space-y-3 mb-4"></div>
            <datalist id="lista-productos"></datalist>
            <button onclick="addInputRow('', 1)" class="flex items-center justify-center gap-2 w-full py-3 border-2 border-dashed border-slate-300 bg-white/50 rounded-xl text-slate-500 font-bold text-xs hover:border-mint-400 hover:text-mint-700 transition-all mb-4 active:scale-95">➕ Añadir producto</button>
            <button onclick="startOptimization()" class="w-full mt-6 dynamic-cta text-white text-[17px] font-extrabold py-4 rounded-2xl shadow-lg shadow-mint-200 flex items-center justify-center gap-2 border border-white/20 active:scale-95">✨ MEJOR PRECIO GLOBAL</button>
        </div>
        <div id="results-section" class="hidden space-y-6 pb-6"></div>
    </main>

    <footer class="max-w-md mx-auto w-full px-6 py-8 mt-auto border-t border-slate-200/60 relative z-10">
        <div class="flex flex-wrap justify-center gap-x-6 gap-y-3 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest text-center">
            <button onclick="openLegal('aviso')" class="hover:text-mint-600">Aviso Legal</button>
            <button onclick="openLegal('privacidad')" class="hover:text-mint-600">Privacidad</button>
            <button onclick="openLegal('cookies')" class="hover:text-mint-600">Cookies</button>
        </div>
    </footer>

    <script>
        const ID_DOCUMENTO = '1r2cN8fnQI0xqb6Xo2K1lOTFWUlGdYhb1';
        const URL_EXCEL = `https://docs.google.com/spreadsheets/d/${ID_DOCUMENTO}/export?format=csv`;
        const SAVED_CART_KEY = 'cestahorro_cesta_v1';

        // Enlaces de las farmacias (aquí sigue mandando el código para la redirección)
        const enlacesTiendas = { 
            "Atida": "https://www.atida.com/es-es", "Dosfarma": "https://www.dosfarma.com/", 
            "Farmacia Jiménez": "https://www.farmaciajimenez.com/", "Farmacia Eva Contreras": "https://www.farmaciaevacontreras.com/", 
            "Farmacia Barata": "https://www.farmaciabarata.es/", "Farmacia Top": "https://farmaciastop.es/", 
            "Farmavazquez": "https://www.farmavazquez.com/", "Sensafarma": "https://www.sensafarma.es/", 
            "FarmaSoler": "https://www.farmasoler.com/", "Farmacias Direct": "https://www.farmaciasdirect.com/", 
            "Farma2go": "https://farma2go.com/", "Pharmacius": "https://www.pharmacius.com/", 
            "Nutritienda": "https://www.nutritienda.com/" 
        };

        let catalogo = {}; let tiendas = {}; let inputCount = 0;
        const inputsContainer = document.getElementById('inputs-container');

        function toggleTiendas() {
            const dropdown = document.getElementById('dropdown-tiendas'), flecha = document.getElementById('fletcha-tiendas');
            if (dropdown.classList.contains('max-h-0')) { dropdown.classList.remove('max-h-0', 'opacity-0'); dropdown.classList.add('max-h-80', 'opacity-100'); flecha.classList.add('rotate-180'); }
            else { dropdown.classList.add('max-h-0', 'opacity-0'); dropdown.classList.remove('max-h-80', 'opacity-100'); flecha.classList.remove('rotate-180'); }
        }

        function limpiarTexto(txt) { return txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toLowerCase().replace(/\s+/g, ' '); }

        function procesarDatosCSV(data) {
            const filas = data.split(/\r?\n/);
            if (filas.length < 4) return;

            const headers = filas[0].split(/,|;/).map(h => h.replace(/"/g, '').trim());
            const shippingCosts = filas[1].split(/,|;/).map(v => parseFloat(v.replace(/"/g, '').replace(',', '.')) || 0);
            const freeThresholds = filas[2].split(/,|;/).map(v => parseFloat(v.replace(/"/g, '').replace(',', '.')) || 0);

            // 1. Construir objeto Tiendas dinámicamente desde el Excel
            tiendas = {};
            const listaTiendasHTML = document.getElementById('lista-tiendas-nombres');
            listaTiendasHTML.innerHTML = '';
            let contadorReal = 0;

            for (let i = 2; i < headers.length; i++) {
                const nombre = headers[i];
                if (nombre && nombre !== "") {
                    tiendas[nombre] = { envio: shippingCosts[i], envioGratisDesde: freeThresholds[i] };
                    const div = document.createElement('div');
                    div.className = "text-[13px] font-bold text-mint-100 opacity-90";
                    div.textContent = nombre;
                    listaTiendasHTML.appendChild(div);
                    contadorReal++;
                }
            }
            document.getElementById('contador-tiendas').textContent = `${contadorReal} Tiendas en vivo`;

            // 2. Procesar catálogo (A partir de la línea 4)
            catalogo = {};
            const datalist = document.getElementById('lista-productos');
            datalist.innerHTML = '';

            for (let i = 3; i < filas.length; i++) {
                let columnas = filas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)|;/);
                if (columnas.length >= 3 && columnas[0].trim() !== '') {
                    const nombreOriginal = columnas[0].replace(/"/g, '').trim();
                    const nombreLimpio = limpiarTexto(nombreOriginal);
                    const imagen = columnas[1] ? columnas[1].replace(/"/g, '').trim() : '';
                    const p = (v) => { if(!v || v.trim()==='') return NaN; let val = parseFloat(v.replace(/"/g, '').trim().replace(',', '.')); return (val > 1000) ? val / 100 : val; };
                    
                    let precios = {};
                    for (let j = 2; j < headers.length; j++) {
                        precios[headers[j]] = p(columnas[j]);
                    }
                    catalogo[nombreLimpio] = { "original": nombreOriginal, "imagen": imagen, ...precios };
                    let opt = document.createElement('option'); opt.value = nombreOriginal; datalist.appendChild(opt);
                }
            }
            document.getElementById('status-text').textContent = "✅ EXCEL VINCULADO";
            document.getElementById('search-section').classList.remove('opacity-0');
            cargarCesta();
        }

        // --- LAS FUNCIONES DE GUARDADO, MODALES Y CÁLCULO SE MANTIENEN IGUAL ---
        function guardarCesta() {
            const rows = document.querySelectorAll('.product-row');
            let cesta = [];
            rows.forEach(r => {
                const inp = r.querySelector('.product-input').value;
                const qty = r.querySelector('.qty-input').value;
                if(inp.trim() !== '') cesta.push({ n: inp, c: qty });
            });
            localStorage.setItem(SAVED_CART_KEY, JSON.stringify({ items: cesta, timestamp: Date.now() }));
        }

        function cargarCesta() {
            if(document.querySelectorAll('.product-row').length > 0) return;
            let savedData = JSON.parse(localStorage.getItem(SAVED_CART_KEY));
            if (savedData && (Date.now() - savedData.timestamp < 24*60*60*1000)) {
                savedData.items.forEach(item => addInputRow(item.n, item.c));
            } else {
                addInputRow('', 1); addInputRow('', 1);
            }
        }

        function vaciarCesta() { localStorage.removeItem(SAVED_CART_KEY); location.reload(); }

        function startOptimization() {
            const rows = document.querySelectorAll('.product-row'); let buscados = []; let error = false;
            rows.forEach(r => {
                const inp = r.querySelector('.product-input'), qty = parseInt(r.querySelector('.qty-input').value);
                if(inp.value.trim() !== '') {
                    const txt = limpiarTexto(inp.value);
                    if(catalogo[txt]) buscados.push({ nombre: txt, cantidad: qty });
                    else error = true;
                }
            });
            if(error || buscados.length === 0) return;
            if(window.location.hash !== '#resultados') history.pushState({vista: 'resultados'}, '', '#resultados');
            document.getElementById('search-section').classList.add('hidden');
            mostrarResultados(calcularMejorCesta(buscados));
        }

        function calcularMejorCesta(lista) {
            let opciones = []; const nombresTiendas = Object.keys(tiendas);
            nombresTiendas.forEach(t => {
                let sub = 0, dist = [], ok = true;
                lista.forEach(i => { let p = catalogo[i.nombre][t]; if(p && !isNaN(p)) { sub += p*i.cantidad; dist.push({n: catalogo[i.nombre].original, c: i.cantidad, p: p*i.cantidad, t: t, img: catalogo[i.nombre].imagen}); } else ok = false; });
                if(ok && sub > 0) {
                    let env = sub >= tiendas[t].envioGratisDesde ? 0 : tiendas[t].envio;
                    opciones.push({ tipo: 'unica', titulo: t, total: sub+env, distribucion: dist, resumen: [{t: t, s: sub, e: env, u: tiendas[t].envioGratisDesde }] });
                }
            });
            return opciones.sort((a,b) => a.total - b.total);
        }

        function mostrarResultados(opts) {
            const res = document.getElementById('results-section'); let html = '';
            opts.slice(0, 3).forEach((o, idx) => {
                html += `<div class="bg-white border-2 ${idx===0?'border-accent-gold shadow-lg':'border-slate-100'} p-6 rounded-[40px] mt-6 relative">
                    <h3 class="text-xl font-black text-center text-slate-900">${o.titulo}</h3>
                    <div class="text-5xl font-black text-center my-4">${o.total.toFixed(2)}€</div>
                    ${o.resumen.map(r => {
                        let falta = r.u - r.s;
                        let truco = (falta > 0 && falta <= 4.99) ? `<div class="bg-amber-50 p-3 rounded-xl text-[10px] font-bold mb-3">💡 ¡Truco! Añade ${falta.toFixed(2)}€ y ahorra el envío de ${r.e.toFixed(2)}€</div>` : '';
                        return `<div class="bg-slate-50 p-4 rounded-3xl">
                            <div class="flex justify-between font-black text-[14px] mb-3 uppercase"><span>${r.t}</span><span>${r.e === 0 ? 'GRATIS' : r.e.toFixed(2)+'€'}</span></div>
                            ${truco}
                            <button onclick="redirigirTienda('${r.t}', '${enlacesTiendas[r.t] || '#'}')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase">Ir a la tienda ➔</button>
                        </div>`;
                    }).join('')}
                </div>`;
            });
            html += `<button onclick="window.history.back()" class="w-full text-slate-400 font-bold py-8 uppercase text-[10px]">← Nueva búsqueda</button>`;
            res.innerHTML = html; res.classList.remove('hidden');
        }

        function redirigirTienda(n, u) {
            document.getElementById('redirect-tienda').textContent = n;
            const m = document.getElementById('redirect-modal'); m.classList.remove('hidden'); setTimeout(()=>m.classList.remove('opacity-0'),10);
            document.getElementById('loading-bar').style.animation = 'loading-bar 3.5s forwards';
            setTimeout(() => { window.open(u, '_blank'); m.classList.add('opacity-0'); setTimeout(()=>m.classList.add('hidden'),300); }, 3500);
        }

        function addInputRow(n='', c=1) {
            inputCount++; const div = document.createElement('div'); div.className = 'product-row flex gap-2'; div.id = `row-${inputCount}`;
            div.innerHTML = `<div class="input-wrapper flex-1 flex bg-white rounded-xl border p-1"><input type="text" list="lista-productos" value="${n}" onchange="guardarCesta()" class="product-input flex-1 px-3 py-2 outline-none font-bold text-sm" placeholder="Producto..."><select onchange="guardarCesta()" class="qty-input bg-slate-50 px-2 font-black text-mint-700">${[1,2,3,4,5,10].map(v=>`<option value="${v}" ${v==c?'selected':''}>${v}</option>`).join('')}</select></div>`;
            inputsContainer.appendChild(div);
        }

        document.addEventListener('DOMContentLoaded', () => { fetch(URL_EXCEL).then(r => r.text()).then(d => procesarDatosCSV(d)); });
        window.addEventListener('popstate', () => { document.getElementById('results-section').classList.add('hidden'); document.getElementById('search-section').classList.remove('hidden'); });
        function abrirMenu() { document.getElementById('menu-lateral').classList.remove('-translate-x-full'); document.getElementById('menu-overlay').classList.remove('hidden'); setTimeout(()=>document.getElementById('menu-overlay').classList.remove('opacity-0'),10); }
        function cerrarMenu() { document.getElementById('menu-lateral').classList.add('-translate-x-full'); document.getElementById('menu-overlay').classList.add('opacity-0'); setTimeout(()=>document.getElementById('menu-overlay').classList.add('hidden'),300); }
    </script>
</body>
</html>
